<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reset Password · Piptrak</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Times New Roman',Times,serif;background:#090c12;color:#c8d8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .logo{font-size:22px;font-weight:700;font-style:italic;color:#e0eaff;margin-bottom:40px;text-decoration:none}
    .logo span{color:#4db8ff}
    .card{background:#0f1520;border:1px solid #1e2a40;border-radius:14px;padding:32px;width:100%;max-width:400px}
    h1{font-size:24px;font-weight:700;font-style:italic;color:#e0eaff;margin-bottom:6px}
    .sub{font-size:13px;color:#556;font-style:italic;margin-bottom:28px}
    label{display:block;font-size:11px;color:#778;margin-bottom:6px;letter-spacing:1px}
    input{background:#0a0f1a;border:1px solid #1e2a40;border-radius:8px;padding:12px 14px;color:#c8d8f0;font-family:'Times New Roman',Times,serif;font-size:15px;width:100%;outline:none;margin-bottom:16px;transition:border 0.2s}
    input:focus{border-color:#3a5080}
    .btn{width:100%;padding:13px;border-radius:8px;font-family:'Times New Roman',Times,serif;font-size:15px;cursor:pointer;border:none;font-style:italic;background:#1e4d8c;color:#c8d8f0;transition:background 0.2s;margin-top:4px}
    .btn:hover{background:#2560b0}
    .btn:disabled{background:#1a2235;color:#445;cursor:not-allowed}
    .msg{border-radius:8px;padding:12px 14px;font-size:13px;font-style:italic;margin-bottom:16px;display:none}
    .msg.success{background:#0d2a1a;border:1px solid #00ff8833;color:#00ff88}
    .msg.error{background:#2a0d14;border:1px solid #ff3b5c33;color:#ff3b5c}
    .strength{height:3px;background:#1e2a40;border-radius:2px;overflow:hidden;margin:-10px 0 16px}
    .strength-fill{height:100%;border-radius:2px;transition:width 0.3s,background 0.3s}
    .back{display:block;text-align:center;font-size:13px;color:#445;font-style:italic;margin-top:20px;text-decoration:none}
    .back:hover{color:#c8d8f0}

    /* ── COOKIE BANNER ── */
    #cookie-banner{position:fixed;bottom:0;left:0;right:0;background:#0f1520;border-top:1px solid #1e2a40;padding:16px 20px;z-index:9999;display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-family:'Times New Roman',Times,serif}
    #cookie-banner p{font-size:13px;color:#778;font-style:italic;flex:1;min-width:200px;line-height:1.6}
    #cookie-banner a{color:#4db8ff}
    .cookie-btns{display:flex;gap:10px;flex-shrink:0}
    .cookie-accept{background:#1e4d8c;color:#c8d8f0;border:none;padding:9px 20px;border-radius:8px;font-family:'Times New Roman',Times,serif;font-size:13px;font-style:italic;cursor:pointer;transition:background 0.2s}
    .cookie-accept:hover{background:#2560b0}
    .cookie-decline{background:transparent;color:#556;border:1px solid #1e2a40;padding:9px 20px;border-radius:8px;font-family:'Times New Roman',Times,serif;font-size:13px;font-style:italic;cursor:pointer;transition:all 0.2s}
    .cookie-decline:hover{border-color:#3a5080;color:#778}
  </style>
</head>
<body>

  <!-- PASSWORD RESET PAGE -->
  <a href="/" class="logo">Pip<span>trak</span></a>

  <div class="card" id="request-form">
    <h1>Reset your password</h1>
    <div class="sub">Enter your email and we'll send a reset link</div>

    <div class="msg" id="req-msg"></div>

    <label>Email address</label>
    <input type="email" id="reset-email" placeholder="you@example.com" autocomplete="email"/>

    <button class="btn" onclick="requestReset()">Send reset link</button>
    <a href="/login" class="back">← Back to sign in</a>
  </div>

  <div class="card" id="new-password-form" style="display:none">
    <h1>Choose new password</h1>
    <div class="sub">Must be at least 8 characters</div>

    <div class="msg" id="pw-msg"></div>

    <label>New password</label>
    <input type="password" id="new-password" placeholder="Min. 8 characters" oninput="checkStrength(this.value)"/>
    <div class="strength"><div class="strength-fill" id="strength-bar" style="width:0%"></div></div>

    <label>Confirm password</label>
    <input type="password" id="confirm-password" placeholder="Repeat password"/>

    <button class="btn" onclick="updatePassword()">Update password</button>
  </div>

  <!-- COOKIE CONSENT BANNER -->
  <div id="cookie-banner">
    <p>
      We use essential cookies to keep you logged in. No advertising or tracking cookies.
      <a href="/privacy.html">Learn more →</a>
    </p>
    <div class="cookie-btns">
      <button class="cookie-decline" onclick="declineCookies()">Essential only</button>
      <button class="cookie-accept" onclick="acceptCookies()">Accept & continue</button>
    </div>
  </div>

  <script>
    // ── Cookie consent ──────────────────────────────────────────
    (function() {
      const consent = localStorage.getItem("pip_cookie_consent");
      if (consent) document.getElementById("cookie-banner").style.display = "none";
    })();

    function acceptCookies() {
      localStorage.setItem("pip_cookie_consent", "all");
      document.getElementById("cookie-banner").style.display = "none";
    }
    function declineCookies() {
      localStorage.setItem("pip_cookie_consent", "essential");
      document.getElementById("cookie-banner").style.display = "none";
    }

    // ── Password strength ───────────────────────────────────────
    function checkStrength(pw) {
      let score = 0;
      if (pw.length >= 8)  score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const pct = (score / 5) * 100;
      const color = score <= 1 ? "#ff3b5c" : score <= 3 ? "#f0c040" : "#00ff88";
      const bar = document.getElementById("strength-bar");
      bar.style.width = pct + "%";
      bar.style.background = color;
    }

    // ── Check if we have a reset token in URL ───────────────────
    const params = new URLSearchParams(window.location.search);
    if (params.get("token") || params.get("type") === "recovery") {
      document.getElementById("request-form").style.display = "none";
      document.getElementById("new-password-form").style.display = "block";
    }

    // ── Request reset email ─────────────────────────────────────
    async function requestReset() {
      const email = document.getElementById("reset-email").value;
      const msg = document.getElementById("req-msg");
      if (!email) { showMsg(msg, "Please enter your email address", "error"); return; }

      const btn = document.querySelector("#request-form .btn");
      btn.disabled = true; btn.textContent = "Sending...";

      // Real implementation: call Supabase resetPasswordForEmail
      // const { error } = await supabase.auth.resetPasswordForEmail(email, {
      //   redirectTo: "https://app.piptrak.com/reset-password"
      // });

      await new Promise(r => setTimeout(r, 1200)); // simulate
      showMsg(msg, "✓ Reset link sent — check your inbox (and spam folder)", "success");
      btn.disabled = false; btn.textContent = "Send reset link";
    }

    // ── Update password ─────────────────────────────────────────
    async function updatePassword() {
      const pw = document.getElementById("new-password").value;
      const confirm = document.getElementById("confirm-password").value;
      const msg = document.getElementById("pw-msg");

      if (pw.length < 8) { showMsg(msg, "Password must be at least 8 characters", "error"); return; }
      if (pw !== confirm) { showMsg(msg, "Passwords do not match", "error"); return; }

      const btn = document.querySelector("#new-password-form .btn");
      btn.disabled = true; btn.textContent = "Updating...";

      // Real implementation:
      // const { error } = await supabase.auth.updateUser({ password: pw });

      await new Promise(r => setTimeout(r, 1200));
      showMsg(msg, "✓ Password updated — redirecting to login...", "success");
      setTimeout(() => window.location.href = "/login", 2000);
    }

    function showMsg(el, text, type) {
      el.textContent = text;
      el.className = "msg " + type;
      el.style.display = "block";
    }
  </script>
</body>
</html>
